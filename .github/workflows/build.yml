name: Build Flutter APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Extract ZIP
        run: |
          unzip devarsh_ai_assistant.zip
          cp -r devarsh_ai_assistant/* .

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Fix Android embedding v2
        run: |
          cat > android/app/src/main/kotlin/com/devarsh/ai_assistant/MainActivity.kt << 'EOF'
          package com.devarsh.ai_assistant
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: devarsh-ai-assistant
          path: build/app/outputs/flutter-apk/app-release.apk
